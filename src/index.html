<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Stock Management System</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- PWA Manifest & iOS Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="apple-touch-icon" href="assets/logo.jpg">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
    rel="stylesheet">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Inline styles for the initial bootstrap loading screen */
    .app-loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);
      font-family: 'Nunito', sans-serif;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    
    body.dark-mode .app-loading-container {
      background: linear-gradient(135deg, #0b0f19 0%, #020617 100%);
    }

    .loader-box {
      text-align: center;
      padding: 2.5rem;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 32px 0 rgba(148, 163, 184, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      max-width: 360px;
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body.dark-mode .loader-box {
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.35);
    }

    .loader-logo {
      width: 80px;
      height: auto;
      margin-bottom: 1.5rem;
      border-radius: 50%;
      animation: pulse-slow 2s infinite ease-in-out;
    }

    .spinner-ring {
      display: inline-block;
      width: 50px;
      height: 50px;
      border: 4px solid rgba(99, 102, 241, 0.1);
      border-radius: 50%;
      border-top-color: #6366f1;
      animation: spin-loader 1s ease-in-out infinite;
      margin-bottom: 1.2rem;
    }

    body.dark-mode .spinner-ring {
      border: 4px solid rgba(129, 140, 248, 0.15);
      border-top-color: #818cf8;
    }

    .loader-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.5rem;
    }

    body.dark-mode .loader-text {
      color: #f3f4f6;
    }

    .loader-subtext {
      font-size: 0.875rem;
      color: #64748b;
    }

    body.dark-mode .loader-subtext {
      color: #9ca3af;
    }

    @keyframes spin-loader {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse-slow {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
    }
  </style>
  <script>
    // Detect and apply dark mode class instantly on boot to match visual style
    (function() {
      try {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.body.classList.add('dark-mode');
        }
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <app-root>
    <div class="app-loading-container">
      <div class="loader-box">
        <img src="assets/logo.jpg" alt="Logo" class="loader-logo" onerror="this.style.display='none'">
        <div class="spinner-ring"></div>
        <h3 class="loader-text">Stock Manager</h3>
        <p class="loader-subtext">Initializing secure system application...</p>
      </div>
    </div>
  </app-root>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Register Service Worker for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registered successfully:', reg))
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
</body>

</html>
